<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />

<body>
    <div class="container login-page">
        <div class="logo">🎬 NETFLIX</div>
        <div class="login-box">
            <h2>🎁 Enter Giveaway</h2>
            <p class="sub">Register with your email to participate</p>
            <form id="registerForm">
                <input type="email" id="email" placeholder="📧 Your Email" required />
                <input type="password" id="password" placeholder="🔒 Create Password" required minlength="4" />
                <input type="text" id="username" placeholder="👤 Your Name (Optional)" />
                <div class="options">
                    <p>🎯 Choose Your Option:</p>
                    <select id="giveawayOption">
                        <option value="Netflix Premium Account">📺 Netflix Premium Account</option>
                        <option value="Netflix 4K Account">🎬 Netflix 4K Account</option>
                        <option value="Netflix Ultra HD">🌟 Netflix Ultra HD</option>
                        <option value="Netflix Family Plan">👨‍👩‍👧‍👦 Netflix Family Plan</option>
                    </select>
                </div>
                <button type="submit" class="cta-btn">🎯 Enter Giveaway</button>
            </form>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
        <div class="contact-section mini">
            <p>📞 Need help? <a href="https://t.me/Virat_K0hli_18" target="_blank">Contact Owner</a></p>
        </div>
        <footer>
            <p>© 2025 <strong>GpsirEra</strong> • Gopal Parmar</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
